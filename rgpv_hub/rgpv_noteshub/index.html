<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LearnLoop - RGPV Notes Hub</title>
    <meta http-equiv="refresh" content="0; url=rgpv_hub_home/code.html" />
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f8fc;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --accent: #1d4ed8;
            --border: #dbe3f0;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #eaf1ff 0%, var(--bg) 46%, #edf2f7 100%);
            color: var(--text);
        }

        main {
            width: min(92vw, 720px);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.05;
        }

        p {
            margin: 0 0 20px;
            color: var(--muted);
            font-size: 1.02rem;
            line-height: 1.6;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 18px;
            border-radius: 999px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
        }

        .note {
            margin-top: 16px;
            font-size: 0.92rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <main>
        <h1>RGPV Notes Hub</h1>
        <p>The site is redirecting to the main dashboard. If the redirect does not happen automatically, open the button below.</p>
        <a href="rgpv_hub_home/code.html">Open Dashboard</a>
        <div class="note">Deploy root: this file makes the project work on GitHub Pages, Netlify, or any static host.</div>
    </main>
</body>
</html>
